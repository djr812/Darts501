<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d0d0d">
    <title>Darts 501</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body
    data-match-id="1"
    data-leg-id="1"
    data-players='[{"id":1,"name":"Player 1","score":501},{"id":2,"name":"Player 2","score":501}]'
>

    <div id="app">
        <!-- Built entirely by ui.js — do not add HTML here -->
    </div>

    <!--
        APP_ROOT: the subpath this app is mounted at, e.g. '/Darts501' or ''.
        Injected by Flask so api.js can prefix all fetch() calls correctly
        regardless of where the app is deployed.
    -->
    <script>
        var APP_ROOT = {{ request.script_root | tojson }};
    </script>

    <script src="{{ url_for('static', filename='js/checkout.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sounds.js') }}"></script>
    <script src="{{ url_for('static', filename='js/speech.js') }}"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
    <script src="{{ url_for('static', filename='js/cpu.js') }}"></script>
    <script src="{{ url_for('static', filename='js/stats.js') }}"></script>
    <script src="{{ url_for('static', filename='js/analysis.js') }}"></script>
    <script src="{{ url_for('static', filename='js/practice.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
